name: Multi-Agent PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel in-progress reviews when a new push arrives
concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Multi-Agent Review
    # Customize: use 'self-hosted' if you have a runner with claude/gemini/codex CLIs installed
    # Or use 'ubuntu-latest' and install the CLIs in a setup step
    runs-on: self-hosted
    timeout-minutes: 10

    # Skip draft PRs and bot-authored PRs
    if: |
      !github.event.pull_request.draft &&
      github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run multi-agent review
        run: scripts/pr-review-bot.sh ${{ github.event.pull_request.number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Customize: add your API keys as repository secrets
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
